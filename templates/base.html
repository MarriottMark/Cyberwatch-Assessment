<!DOCTYPE html>
<html>
    <head>
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>{% block title %}Cyberwatch{% endblock %}</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
        <link rel='stylesheet' href='/static/css/styles.css'>

    </head>
    <body class="body">
        <div class="container-fluid p-0 d-flex align-items-center ">
            <div class="col-4">
                <a href="/">
                    <img class='logo' src='/static/images/logo.png' height='75'>
                </a>
            </div>
            <div class="col-4">
                <h1 class="flex-grow-1 text-center m-0">Cyberwatch</h1>
            </div>
            
            <div class="col-4"></div>
        </div>
        


        <h2 class=" custom-head">{% block heading%}Vulnerabilities tracker{% endblock %}</h2>
        
        <div class='content'>
            {% block content %}{% endblock %}
        </div>
        <script src="static/js/script.js">
            
        </script> 
    </body>
</html>
