<!DOCTYPE html>
<html lang="en">
    <head>
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta name="description" content="Straight up and OWASP thing innit">
        <title>{% block title %}Cyberwatch{% endblock %}</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
        <link rel='stylesheet' href='/static/css/styles.css'>
        <link rel="manifest" href="/static/manifest.json">
        <link rel="icon" href="/static/icons/favicon.ico" type="image/x-icon">

    </head>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/static/js/service-worker.js')
                .then(() => console.log('Service Worker Registered'));
        }
    </script>
    <body class="body" role="main">
        <div class="container-fluid">
            <div class="row align-items-center">
                <div class="col-12 col-md-4 text-center text-md-start mb-2 mb-md-0">
                    <a href="/">
                        <img class="logo" src="/static/images/logo.png" alt="Logo" fetchpriority="high">
                    </a>
                </div>

                <div class="col-12 col-md-4 text-center">
                    <h1 class="m-0">Cyberwatch</h1>
                </div>

                <div class="d-none d-md-block col-md-4"></div>
            </div>
        </div>

        


        <h2 class=" align-items-center custom-head d-flex text-center justify-content-center">{% block heading%}Vulnerabilities tracker{% endblock %}</h2>
        
        <div class='content'>
            {% block content %}{% endblock %}
        </div>
        <script src="{{ url_for('static', filename='js/script.js') }}" defer></script>
            
        </script>
        <!-- <div>
            <a class="btn btn-warning btn-block text-white" href="/privacy" >Our Privacy Policy</a>
        </div>  -->
    </body>
</html>
