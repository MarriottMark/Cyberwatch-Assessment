{% extends 'base.html' %}

<!-- update the heading to be OWASP Vulnerabilities -->


{% block heading %}OWASP Vulnerabilities{% endblock %}

<!-- Use a for loop to display the OWASP ranks in a table. -->
{% block content %}

<div class="row">
    {% for v in vulnerabilities %}
    <div class="col-12 col-md-6 mb-3">
        <div class="card p-3 ">
            <h3>Rank: {{ v.owasp_rank }}</h3>
            <p>{{ v.vul_name }}</p>
            <a href="/incidents/{{ v.id }}" class="btn btn-block btn-warning text-white">View</a>
        </div>
    </div>
    {% endfor %}
</div>
{% endblock %}
